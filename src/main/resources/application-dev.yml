spring:
  datasource:
    url: jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:raven}
    password: ${DB_PASSWORD:raven123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    #solo ver queries en el desarrollo
    show-sql: true
    properties:
      hibernate:
        format_sql: true

#Detalles solo para desarrollo
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.jbe.msemployee: DEBUG